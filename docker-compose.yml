version: "3.8"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    environment:
      - PORT=${PORT:-5001}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/smart-leads}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5001/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
